services:
  app:
    build: .
    container_name: image-server-app
    ports:
      - "8000:8000"
    volumes:
      - ./app.py:/app/app.py
      - ./config.py:/app/config.py
      - ./logger_config.py:/app/logger_config.py
      - ./services:/app/services
      - ./repositories:/app/repositories
      - ./db:/app/db
      - ./utils:/app/utils
      - ./static:/app/static
      - ./images:/app/images
      - ./logs:/app/logs
    environment:
      TZ: ${TZ}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    container_name: image-server-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backup:
    image: postgres:16-alpine
    container_name: image-server-backup
    env_file:
      - .env
    environment:
      TZ: ${TZ}
    volumes:
      - ./backups:/backups
      - ./logs:/logs
      - ./scripts:/scripts:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/scripts/backup_loop.sh"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: image-server-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./images:/images:ro
    depends_on:
      - app
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data: