<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Image Server</title>

    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <link rel="stylesheet" href="/image-uploader/css/reset.css">
    <link rel="stylesheet" href="/image-uploader/css/base.css">
    <link rel="stylesheet" href="/image-uploader/css/pages/home.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="header">
            <h1 class="header__title">Upload Photos</h1>
            <p class="header__text">Upload selfies, memes, or any fun pictures here.</p>
        </div>
        <div class="header__button">
            <button id="header__button-btn" class="header__button-btn header__button-btn--gallery">
                Gallery
            </button>
        </div>
    </header>
    <main>
        <div class="hero">
            <div class="hero__img">
                <img class="img" src="/image-uploader/img/Nord.png" alt="Nord">
            </div>
            <div class="hero__img">
                <img class="img" src="/image-uploader/img/Cat.png" alt="Cat">
            </div>
            <div class="hero__img">
                <img class="img" src="/image-uploader/img/Griz.png" alt="Griz">
            </div>
            <div class="hero__img">
                <img class="img" src="/image-uploader/img/Zero.png" alt="Zero">
            </div>
            <div class="hero__img">
                <img class="img" src="/image-uploader/img/Eric.png" alt="Eric">
            </div>
        </div>
    </main>
</body>
<script type="module" src="/image-uploader/js/home.js"></script>

</html>
